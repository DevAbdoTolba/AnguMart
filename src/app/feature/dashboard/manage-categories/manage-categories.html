<app-navbar></app-navbar>
<div class="container-fluid py-4 manage-categories-page">
  <h2 class="text-white fw-bold mb-4">Manage Categories</h2>

  <div *ngIf="message" class="alert animate__animated animate__fadeIn" [ngClass]="isError ? 'alert-danger' : 'alert-success'">
    {{ message }}
  </div>

  <div class="card bg-dark-card border-0 mb-4 p-4">
    <h5 class="text-white mb-3">Add New Category</h5>
    <div class="d-flex gap-2">
      <input type="text" class="form-control bg-dark-input text-white border-0" [(ngModel)]="newCategoryName" placeholder="Category name...">
      <button class="btn btn-success px-4 rounded-pill" (click)="addCategory()">Add</button>
    </div>
  </div>

  <div class="card bg-dark-card border-0 overflow-hidden">
    <table class="table table-dark table-hover mb-0">
      <thead class="bg-darker">
        <tr>
          <th class="ps-4">CATEGORY NAME</th>
          <th>PRODUCTS</th>
          <th class="text-center">ACTIONS</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let cat of categories">
          <td class="ps-4 text-white">{{ cat.name }}</td>
          <td class="text-secondary">{{ cat.productCount || 0 }} products</td>
          <td class="text-center">
            <button class="btn btn-sm btn-danger me-2 rounded-pill px-3" (click)="onEdit(cat)">Edit</button>
            <button class="btn btn-sm btn-danger rounded-pill px-3"
                    data-bs-toggle="modal"
                    data-bs-target="#deleteModal"
                    (click)="onDelete(cat._id!)">
              Delete
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <div *ngIf="editMode" class="card bg-dark-card border-danger border-1 mt-4 p-4 animate__animated animate__fadeInUp">
    <h5 class="text-danger mb-3">Edit Category</h5>
    <div class="d-flex gap-2">
      <input type="text" class="form-control bg-dark-input text-white border-0" [(ngModel)]="selectedCategory.name">
      <button class="btn btn-danger rounded-pill px-4" (click)="updateCategory()">Save</button>
      <button class="btn btn-outline-secondary text-white rounded-pill px-4" (click)="cancelEdit()">Cancel</button>
    </div>
  </div>

  <div class="modal fade" id="deleteModal" tabindex="-1" aria-labelledby="deleteModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content bg-dark-card text-white border-secondary shadow-lg">
        <div class="modal-header border-secondary">
          <h5 class="modal-title" id="deleteModalLabel">Confirm Delete</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body py-4">
          <p class="mb-0">Are you sure you want to delete this category? This action cannot be undone.</p>
        </div>
        <div class="modal-footer border-secondary">
          <button type="button" class="btn btn-outline-light rounded-pill px-4" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-danger rounded-pill px-4" (click)="confirmDelete()" data-bs-dismiss="modal">Delete Now</button>
        </div>
      </div>
    </div>
  </div>
</div>
