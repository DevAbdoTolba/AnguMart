<nav class="navbar-wrapper">
  <div class="navbar-inner">
    <!-- Brand -->
    <a routerLink="/" class="navbar-brand">{{ brandName() }}</a>

    <!-- Search Bar -->
    <div class="search-bar">
      <i class="bi bi-search search-bar-icon"></i>
      <input
        type="text"
        [placeholder]="searchPlaceholder()"
        [value]="searchValue()"
        (input)="onSearchInput($event)"
      />
    </div>

    <!-- Right-side links: default links plus any projected content -->
    <div class="navbar-links">
      <!-- always show wishlist & cart so that global header covers most pages -->
      <a routerLink="/wishlist" class="d-flex align-items-center gap-2 text-decoration-none text-secondary fw-semibold">
        <i class="bi bi-heart"></i><span>Wishlist</span>
      </a>
      <a routerLink="/cart" class="d-flex align-items-center gap-2 text-decoration-none text-secondary fw-semibold">
        <i class="bi bi-cart3"></i><span>Cart</span>
      </a>
      <!-- admin dashboard shortcut -->
      <a *ngIf="isAdmin()" routerLink="/dashboard" class="d-flex align-items-center gap-2 text-decoration-none text-warning fw-semibold">
        <i class="bi bi-speedometer2"></i><span>Dashboard</span>
      </a>
      <!-- authentication links -->
      <a *ngIf="!isLoggedIn" routerLink="/login" class="d-flex align-items-center gap-2 text-decoration-none text-secondary fw-semibold">
        <i class="bi bi-box-arrow-in-right"></i><span>Login</span>
      </a>
      <a *ngIf="!isLoggedIn" routerLink="/signup" class="d-flex align-items-center gap-2 text-decoration-none text-secondary fw-semibold">
        <i class="bi bi-person-plus"></i><span>Sign&nbsp;up</span>
      </a>
      <button *ngIf="isLoggedIn" (click)="logout()" class="btn btn-link text-secondary text-decoration-none d-flex align-items-center gap-2 p-0">
        <i class="bi bi-box-arrow-right"></i><span>Logout</span>
      </button>
      <ng-content />
    </div>
  </div>
</nav>
